{{ define "main" }}
<header>
    <h2>Site Updates</h2>
</header>
<div class="updates-log">
    {{ range .Pages.ByDate.Reverse }}
    <section style="margin-bottom: 20px;">
        <strong>[{{ .Title }}]</strong>
        <div style="margin-left: 20px; font-size: 0.9em;">
            {{ .Content }}
        </div>
    </section>
    {{ end }}
</div>
{{ end }}
